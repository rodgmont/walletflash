<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo comercio — Flash Checkout</title>
  <script src="/flash-checkout.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #fafafa; margin: 0; padding: 0; }
    header { background: #17191e; padding: 20px 40px; color: #fff; }
    .container { max-width: 800px; margin: 40px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .product { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #eee; gap: 16px; flex-wrap: wrap; }
    .product-info h3 { margin: 0 0 8px 0; }
    .product-info p { margin: 0; color: #666; }
    .buy-btn { background: #f7931a; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
    code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>

  <header>
    <h2>CoolStore (demo)</h2>
  </header>

  <div class="container">
    <h1>Checkout</h1>
    <p>Página de ejemplo: importa <code>flash-checkout.js</code> desde <strong>tu despliegue</strong> de la app (mismo origen que las rutas <code>/.well-known/lnurlp/…</code>).</p>
    <p>Cambia <code>data-address</code> al alias que registraste en el onboarding (formato <code>alias@flash.xyz</code>).</p>

    <div class="product">
      <div class="product-info">
        <h3>Suscripción premium</h3>
        <p>1 mes de acceso</p>
      </div>
      <div>
        <button
          type="button"
          class="buy-btn"
          data-flash-checkout="true"
          data-sats="15000"
          data-address="merchant@flash.xyz"
        >
          Pagar 15.000 sats ⚡
        </button>
      </div>
    </div>
  </div>

</body>
</html>
